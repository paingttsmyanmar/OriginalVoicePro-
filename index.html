<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI အသံထုတ်လုပ်ခြင်း - Telegram @trollmovie123</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #0d1117; /* GitHub Dark Mode Theme */
            color: #c9d1d9;
        }

        /* Header အပိုင်း */
        header {
            padding: 16px 24px;
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            text-align: center;
        }

        header h1 {
            font-size: 1.3rem;
            color: #58a6ff;
            line-height: 1.4;
        }

        /* Hugging Face App Frame (အလယ်ပိုင်း) */
        .iframe-container {
            flex: 1;
            width: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Footer အပိုင်း (အောက်ဆုံးတွင် အမြဲပေါ်နေမည်) */
        footer {
            padding: 12px 24px;
            background-color: #161b22;
            border-top: 1px solid #30363d;
            text-align: center;
            font-size: 0.85rem;
            color: #8b949e;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* စာသားနှစ်ခုကြား ခြားပေးထားခြင်း */
            flex-wrap: wrap;
        }

        footer a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Header အပိုင်း -->
    <header>
        <h1>စာလုံးရေအကန့်သတ်မရှိAi အသံထုတ်ဖို့ Telegram @trollmovie123 ကိုဆက်သွယ်ပါ</h1>
    </header>

    <!-- Hugging Face App အပိုင်း -->
    <div class="iframe-container">
        <iframe 
            src="https://openbmb-voxcpm-demo.hf.space" 
            allow="autoplay; microphone; camera; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <!-- Footer အပိုင်း -->
    <footer>
        <p>Power Director By Paing Hein Kyaw</p>
        <span>|</span>
        <p>Contact: <a href="https://t.me/trollmovie123" target="_blank">@trollmovie123 Telegram</a></p>
    </footer>

</body>
</html>
